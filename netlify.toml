[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/extract"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/extract/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/library"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/library/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
